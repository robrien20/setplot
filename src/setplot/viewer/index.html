<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SetPlot — library</title>
<style>
  :root {
    --bg: #0e1420;
    --panel: #1a2233;
    --panel-2: #242e42;
    --border: #2e3a52;
    --fg: #e6ecf5;
    --fg-dim: #8798b6;
    --accent: #4dd0e1;
    --accent-2: #ffca28;
    --strong: #3cb371;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    font-size: 14px; }

  header { padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  header h1 .accent { color: var(--accent); }
  #count { color: var(--fg-dim); font-size: 12px; }

  #import-form { display: flex; gap: 8px; flex: 1; max-width: 720px; margin: 0 24px; }
  #import-target { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--fg);
    padding: 8px 12px; border-radius: 6px; font-size: 13px; font-family: monospace; }
  #import-submit { background: var(--accent); border: 1px solid var(--accent); color: var(--bg);
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
  #import-submit:hover { background: #6ee0f0; }
  #import-status { margin: 0 24px; padding: 8px 12px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; color: var(--fg-dim); font-size: 12px; font-family: monospace;
    white-space: pre-wrap; max-height: 160px; overflow: auto; display: none; }
  #import-status.show { display: block; }

  main { padding: 24px; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; cursor: pointer; transition: border-color 0.15s, transform 0.15s; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 8px; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .thumb { width: 100%; aspect-ratio: 16 / 9; background: var(--panel-2); border-radius: 4px;
    background-size: cover; background-position: center; display: flex; align-items: center;
    justify-content: center; color: var(--fg-dim); font-size: 11px; }
  .card-title { font-weight: 600; font-size: 13px; line-height: 1.3; overflow: hidden;
    text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card-meta { color: var(--fg-dim); font-size: 11px; font-family: monospace; display: flex;
    justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .progress { width: 100%; height: 4px; background: var(--panel-2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--strong); transition: width 0.3s; }
  .progress.partial .progress-fill { background: var(--accent-2); }
  .progress.empty .progress-fill { background: var(--fg-dim); }

  .empty-state { color: var(--fg-dim); padding: 80px 24px; text-align: center; font-size: 14px; }
  .empty-state code { background: var(--panel); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1><span class="accent">SetPlot</span> — library</h1>
  <form id="import-form" onsubmit="return false;">
    <input id="import-target" type="text" placeholder="paste a YouTube URL or local file path…" autocomplete="off" />
    <button id="import-submit" type="submit">import</button>
  </form>
  <span id="count"></span>
</header>
<div id="import-status"></div>
<main>
  <div id="grid"></div>
</main>
<script src="static/library.js"></script>
</body>
</html>
